name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy fulfill-order --project-ref cscakblvipadupebrpkh
          supabase functions deploy paystack-webhook --project-ref cscakblvipadupebrpkh
          supabase functions deploy paystack-initialize --project-ref cscakblvipadupebrpkh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
